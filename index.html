<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода в мире — реальная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s;
        }

        .weather-card:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 2.2em;
            color: #1e3c72;
            margin-bottom: 25px;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        #cityInput {
            flex: 1;
            min-width: 200px;
            padding: 14px 20px;
            font-size: 1em;
            border: 2px solid #ddd;
            border-radius: 50px;
            outline: none;
            transition: 0.3s;
        }

        #cityInput:focus {
            border-color: #2a5298;
            box-shadow: 0 0 8px rgba(42, 82, 152, 0.3);
        }

        #searchBtn {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1em;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        #searchBtn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .weather-result {
            margin-top: 20px;
            padding: 20px;
            background: #f0f4ff;
            border-radius: 30px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .city-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 10px;
        }

        .temp {
            font-size: 3em;
            font-weight: bold;
            color: #2a5298;
            margin: 10px 0;
        }

        .description {
            font-size: 1.2em;
            color: #555;
            text-transform: capitalize;
            margin: 10px 0;
        }

        .details {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .detail-item {
            background: white;
            padding: 10px 15px;
            border-radius: 20px;
            flex: 1;
            min-width: 80px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .error {
            color: #d32f2f;
            font-weight: bold;
            padding: 15px;
        }

        .loading {
            color: #2a5298;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="weather-card">
        <h1>🌤️ Погода в мире</h1>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Введите город (например, Лондон, Токио, Ташкент)">
            <button id="searchBtn">🔍 Найти</button>
        </div>
        <div id="weatherResult" class="weather-result">
            <p>Введите город и нажмите "Найти"</p>
        </div>
    </div>

    <script>
        // API ключ OpenWeatherMap
        const API_KEY = "37a573d5229273cbe7113f383bbce331";

        const cityInput = document.getElementById("cityInput");
        const searchBtn = document.getElementById("searchBtn");
        const weatherResult = document.getElementById("weatherResult");

        async function getWeather() {
            const city = cityInput.value.trim();
            if (!city) {
                weatherResult.innerHTML = '<p class="error">🌍 Введите название города!</p>';
                return;
            }

            weatherResult.innerHTML = '<p class="loading">⏳ Загрузка погоды...</p>';

            try {
                const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric&lang=ru`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error("Город не найден");
                    } else {
                        throw new Error("Ошибка сервера. Попробуйте позже");
                    }
                }
                
                const data = await response.json();
                
                const cityName = data.name;
                const country = data.sys.country;
                const temp = Math.round(data.main.temp);
                const feelsLike = Math.round(data.main.feels_like);
                const description = data.weather[0].description;
                const humidity = data.main.humidity;
                const windSpeed = data.wind.speed;
                const iconCode = data.weather[0].icon;
                const iconUrl = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;

                weatherResult.innerHTML = `
                    <div class="city-name">${cityName}, ${country}</div>
                    <img src="${iconUrl}" alt="${description}" style="width: 80px; margin: 10px auto;">
                    <div class="temp">${temp}°C</div>
                    <div class="description">${description}</div>
                    <div class="details">
                        <div class="detail-item">🌡️ Ощущается: ${feelsLike}°C</div>
                        <div class="detail-item">💧 Влажность: ${humidity}%</div>
                        <div class="detail-item">💨 Ветер: ${windSpeed} м/с</div>
                    </div>
                `;
            } catch (error) {
                weatherResult.innerHTML = `<p class="error">❌ ${error.message}</p>`;
            }
        }

        searchBtn.addEventListener("click", getWeather);
        cityInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                getWeather();
            }
        });
    </script>
</body>
</html>
