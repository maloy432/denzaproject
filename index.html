<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Папе с любовью ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Летающие сердечки */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-hearts i {
            position: absolute;
            font-size: 20px;
            opacity: 0.3;
            color: white;
            animation: floatHeart 10s linear infinite;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% {
                transform: translateY(-20vh) rotate(20deg);
                opacity: 0;
            }
        }

        .card {
            position: relative;
            z-index: 10;
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 48px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            font-size: 70px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
        }

        .message {
            font-size: 1.2em;
            color: #333;
            margin: 20px 0;
            line-height: 1.6;
        }

        .highlight {
            background: linear-gradient(135deg, #667eea20, #764ba220);
            padding: 20px;
            border-radius: 30px;
            margin: 20px 0;
            font-style: italic;
            font-size: 1.1em;
            color: #555;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 1.1em;
            cursor: pointer;
            margin: 15px 0;
            transition: 0.3s;
            font-weight: 600;
        }

        button:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #a07bc9;
            border-top: 1px solid #f0e4ff;
            padding-top: 20px;
        }

        /* Конфетти */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ff0000;
            position: absolute;
            animation: confettiFall 3s linear forwards;
            z-index: 999;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="floating-hearts" id="floatingHearts"></div>

    <div class="card">
        <div class="icon">👨‍👧‍👦</div>
        <h1>С днём рождения, Папа! 🎉</h1>
        
        <div class="message">
            Ты — моя опора и пример для подражания. <br>
            Спасибо за всё, что ты для меня делаешь.
        </div>
        
        <div class="highlight">
            "Лучший папа в мире — это ты. <br>
            Я очень тебя люблю! 💖"
        </div>
        
        <button id="surpriseBtn">🎁 Нажми для сюрприза 🎁</button>
        
        <div class="footer">
            С любовью, твой(а) сын/дочь ❤️
        </div>
    </div>

    <script>
        // Фоновые сердечки
        function createFloatingHearts() {
            const container = document.getElementById('floatingHearts');
            const hearts = ['❤️', '💖', '💗', '💓', '💕', '💝', '🎈', '🎉'];
            
            for (let i = 0; i < 30; i++) {
                const heart = document.createElement('i');
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = Math.random() * 8 + 6 + 's';
                heart.style.animationDelay = Math.random() * 10 + 's';
                heart.style.fontSize = Math.random() * 24 + 16 + 'px';
                heart.style.opacity = Math.random() * 0.4 + 0.1;
                container.appendChild(heart);
            }
        }

        // Конфетти
        function createConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffaa00', '#ff44aa'];
            
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = Math.random() * 12 + 4 + 'px';
                confetti.style.height = Math.random() * 12 + 4 + 'px';
                confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        // Секретное сообщение
        function showLove() {
            createConfetti();
            
            const messages = [
                "🎉 Папа, ты лучший! 🎉",
                "💖 Спасибо за всё, что ты делаешь 💖",
                "👨‍👧‍👦 Ты моя гордость и опора 👨‍👧‍👦",
                "🏆 Лучший отец в мире! 🏆",
                "✨ Ты всегда рядом, когда нужен ✨"
            ];
            
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            
            // Всплывающее окно с сердечками
            alert(randomMsg);
        }

        createFloatingHearts();
        
        document.getElementById('surpriseBtn').onclick = showLove;
    </script>
</body>
</html>
